<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e0f2fe;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            padding: 2rem;
            color: #0f172a;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(to bottom, #7dd3fc, #0ea5e9);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.3);
            margin: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <h1>Tea Campaign</h1>
    <a href="../../index.html" class="btn">← Back to Portfolio</a>
    <div style="max-width: 1000px; margin: 2rem auto;">
        <img src="tealogo.png" alt="Tea Logo">
        <img src="billboard.png" alt="Billboard">
        <img src="car wrap.png" alt="Car Wrap">
        <img src="christmas ad.png" alt="Christmas Ad">
        <img src="magazine ad1.png" alt="Magazine Ad">
    </div>
</body>

</html>
